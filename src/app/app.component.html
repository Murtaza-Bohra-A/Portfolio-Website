

<app-rcontent />


<!-- Desktop / Laptop Nav -->

<div class="nav">
  <div class="nav d-none d-md-flex justify-content-center">
    <button class="button" routerLink="/home">
      <svg class="bi bi-house-fill text-primary" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">...</svg>
    </button>

    <button class="button1" routerLink="/education">
      <svg class="bi bi-journal-code text-primary" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">...</svg>
    </button>

    <button class="button2" routerLink="/work">
      <svg class="bi bi-person-workspace text-primary" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">...</svg>
    </button>

    <button class="button3" routerLink="/contect">
      <svg class="bi bi-phone text-primary" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">...</svg>
    </button>

    <button class="chatBtn" (click)="toggleChat()">

      <span class="tooltip">Chat</span>

    <div class="chat-container" [class.open]="isChatOpen">
      <div class="chat-header">AI Assistant</div>

      <div class="chat-body">
        <div *ngFor="let msg of messages" [class.user]="msg.from === 'user'">
          {{ msg.text }}
        </div>
      </div>

      <div class="chat-footer">
        <input [(ngModel)]="userInput" placeholder="Type message..." />
        <button (click)="sendMessage()">Send</button>
      </div>
    </div>
  </div>
</div>
